name: Translation Freshness Check

on:
  schedule:
    - cron: '0 9 * * 1'  # Every Monday at 9am UTC
  workflow_dispatch: {}

permissions:
  issues: write
  contents: read

jobs:
  check-translations:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683  # v4

      - name: Check i18n key parity
        id: parity
        run: |
          EN_KEYS=$(grep -c '^\[' i18n/en.toml || echo 0)
          REPORT=""
          STALE=0

          for lang in de fr es ru uk; do
            LANG_KEYS=$(grep -c '^\[' "i18n/${lang}.toml" || echo 0)
            if [ "$LANG_KEYS" != "$EN_KEYS" ]; then
              REPORT="${REPORT}\n- **${lang}**: ${LANG_KEYS} keys (EN has ${EN_KEYS})"
              STALE=1
            fi
          done

          # Check docs content freshness (compare English modification dates vs translations)
          STALE_DOCS=""
          for file in content/en/docs/**/*.md; do
            rel="${file#content/en/}"
            en_mod=$(git log -1 --format=%ct -- "$file" 2>/dev/null || echo 0)
            for lang in de fr es ru uk; do
              trans="content/${lang}/${rel}"
              if [ -f "$trans" ]; then
                trans_mod=$(git log -1 --format=%ct -- "$trans" 2>/dev/null || echo 0)
                if [ "$en_mod" -gt "$trans_mod" ]; then
                  STALE_DOCS="${STALE_DOCS}\n- \`${rel}\` — **${lang}** is behind English"
                  STALE=1
                fi
              else
                STALE_DOCS="${STALE_DOCS}\n- \`${rel}\` — **${lang}** MISSING"
                STALE=1
              fi
            done
          done

          echo "stale=${STALE}" >> "$GITHUB_OUTPUT"
          echo "en_keys=${EN_KEYS}" >> "$GITHUB_OUTPUT"

          {
            echo "report<<EOF"
            echo "## Translation Freshness Report"
            echo ""
            echo "**English keys:** ${EN_KEYS}"
            echo ""
            if [ -n "$REPORT" ]; then
              echo "### Key Parity Issues"
              echo -e "$REPORT"
              echo ""
            else
              echo "### Key Parity: OK (all languages have ${EN_KEYS} keys)"
              echo ""
            fi
            if [ -n "$STALE_DOCS" ]; then
              echo "### Stale Doc Translations"
              echo -e "$STALE_DOCS"
            else
              echo "### Doc Translations: All fresh"
            fi
            echo "EOF"
          } >> "$GITHUB_OUTPUT"

      - name: Create or update issue
        if: steps.parity.outputs.stale == '1'
        run: |
          EXISTING=$(gh issue list --label "translation" --state open --json number --jq '.[0].number' || echo "")
          BODY="${{ steps.parity.outputs.report }}"

          if [ -n "$EXISTING" ]; then
            gh issue comment "$EXISTING" --body "$BODY"
          else
            gh issue create \
              --title "Translation freshness: stale translations detected" \
              --body "$BODY" \
              --label "translation" --label "growth-agent"
          fi
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
