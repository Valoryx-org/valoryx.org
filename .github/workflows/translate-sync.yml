# ──────────────────────────────────────────────────────────────────────────────
# Translation Freshness Detection
#
# WHAT IT DOES:
#   When i18n/en.toml changes on main, this workflow checks if translations
#   are stale and creates a GitHub issue if so.
#
# WHO TRANSLATES:
#   Claude Opus running on a local machine. The developer pulls latest,
#   runs `python scripts/translate-sync.py detect`, Claude translates,
#   then `python scripts/translate-sync.py apply`. Push to main deploys.
#
# This workflow does NOT auto-translate — it only detects and notifies.
# ──────────────────────────────────────────────────────────────────────────────

name: Check translation freshness

on:
  push:
    branches: [main]
    paths:
      - "i18n/en.toml"
  schedule:
    - cron: '0 9 * * 1'  # Every Monday at 9am UTC
  workflow_dispatch: {}

permissions:
  issues: write
  contents: read

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2

      - name: Set up Python
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065  # v5.6.0
        with:
          python-version: '3.12'

      - name: Check for stale translations
        id: check
        run: |
          OUTPUT=$(python scripts/translate-sync.py status 2>&1)
          echo "$OUTPUT"

          if echo "$OUTPUT" | grep -q "ALL IN SYNC"; then
            echo "stale=false" >> "$GITHUB_OUTPUT"
          else
            echo "stale=true" >> "$GITHUB_OUTPUT"
            echo "details<<EOF" >> "$GITHUB_OUTPUT"
            echo "$OUTPUT" >> "$GITHUB_OUTPUT"
            echo "EOF" >> "$GITHUB_OUTPUT"
          fi

      - name: Create or update issue
        if: steps.check.outputs.stale == 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          BODY="## Stale Translations Detected

          ${{ steps.check.outputs.details }}

          ### How to fix
          On your machine:
          \`\`\`bash
          cd site/valoryx.org
          git pull
          python scripts/translate-sync.py detect
          # Claude translates pending-translations.json
          # Claude writes completed-translations.json
          python scripts/translate-sync.py apply
          git add i18n/ .i18n-checksums.json
          git commit -m 'i18n: sync translations with English'
          git push
          \`\`\`"

          EXISTING=$(gh issue list --label "translation" --state open --json number --jq '.[0].number' 2>/dev/null || echo "")

          if [ -n "$EXISTING" ] && [ "$EXISTING" != "null" ]; then
            gh issue comment "$EXISTING" --body "$BODY"
          else
            gh issue create \
              --title "i18n: translations are stale" \
              --body "$BODY" \
              --label "translation" --label "growth-agent"
          fi
