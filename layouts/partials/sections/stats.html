<!-- ======= Stats Section ======= -->
<section id="stats" class="py-16 md:py-20">
  <div class="max-w-5xl mx-auto px-4 sm:px-6 lg:px-8">
    <div class="grid grid-cols-2 md:grid-cols-5 gap-4">
      <div class="stats-item reveal reveal-delay-1">
        <span>1</span>
        <p>{{ i18n "stats1_label" }}</p>
      </div>
      <div class="stats-item reveal reveal-delay-2">
        <span>&lt;30s</span>
        <p>{{ i18n "stats2_label" }}</p>
      </div>
      <div class="stats-item reveal reveal-delay-3">
        <span>100%</span>
        <p>{{ i18n "stats3_label" }}</p>
      </div>
      <div class="stats-item reveal reveal-delay-4">
        <span>$0</span>
        <p>{{ i18n "stats4_label" }}</p>
      </div>
      <div class="stats-item reveal reveal-delay-1">
        <span>13</span>
        <p>{{ i18n "stats5_label" | default "MCP Tools" }}</p>
      </div>
    </div>
  </div>
</section>
