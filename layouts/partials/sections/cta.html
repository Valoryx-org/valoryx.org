<!-- ======= CTA Section ======= -->
{{ $homeURL := cond (eq .Language.Lang "en") "/" (printf "/%s/" .Language.Lang) }}
<section id="cta" class="cta-section">
  <div class="max-w-4xl mx-auto px-4 sm:px-6 lg:px-8 text-center reveal">
    <h3>{{ i18n "cta_title" }}</h3>
    <p>{{ i18n "cta_text" }}</p>
    <div class="flex flex-wrap justify-center gap-3">
      <a href="{{ $homeURL }}install/" class="cta-btn">{{ i18n "cta_btn1" }}</a>
      <a href="https://app.valoryx.dev/" class="cta-btn">{{ i18n "hero_cta_cloud" }}</a>
    </div>
  </div>
</section>
