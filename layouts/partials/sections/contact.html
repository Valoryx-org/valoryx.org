<!-- ======= Contact Section ======= -->
<section id="contact" class="py-20 md:py-28">
  <div class="max-w-3xl mx-auto px-4 sm:px-6 lg:px-8">

    <div class="section-title reveal">
      <h2>{{ i18n "contact_title" }}</h2>
      <p>{{ i18n "contact_subtitle" }}</p>
    </div>

    <form class="contact-form space-y-5 reveal" onsubmit="handleSubmit(event)" data-webhook="{{ .Site.Params.n8nWebhook }}">
      <!-- Honeypot — hidden from real users, bots fill it -->
      <input type="text" name="website" autocomplete="off" tabindex="-1" style="position:absolute;left:-9999px;opacity:0;height:0;width:0;" aria-hidden="true" aria-label="Do not fill this field">
      <div class="grid grid-cols-1 sm:grid-cols-2 gap-5">
        <label for="contact-name" class="sr-only">{{ i18n "contact_name_ph" }}</label>
        <input type="text" id="contact-name" name="name" placeholder="{{ i18n "contact_name_ph" }}" required autocomplete="name">
        <label for="contact-email" class="sr-only">{{ i18n "contact_email_ph" }}</label>
        <input type="email" id="contact-email" name="email" placeholder="{{ i18n "contact_email_ph" }}" required autocomplete="email">
      </div>
      <label for="contact-role" class="sr-only">{{ i18n "contact_role_ph" }}</label>
      <input type="text" id="contact-role" name="role" placeholder="{{ i18n "contact_role_ph" }}" autocomplete="organization-title">
      <label for="contact-message" class="sr-only">{{ i18n "contact_msg_ph" }}</label>
      <textarea id="contact-message" name="message" rows="5" placeholder="{{ i18n "contact_msg_ph" }}" minlength="10"></textarea>
      <div class="text-center">
        <button type="submit">{{ i18n "contact_submit" }}</button>
      </div>
    </form>

  </div>
</section>
