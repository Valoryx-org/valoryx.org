[about_title]
other = "À propos de Valoryx"
[about_subtitle]
other = "Une plateforme de documentation pour les équipes qui prennent leurs docs au sérieux"
[about_p1]
other = "Valoryx est la plateforme de documentation que les développeurs attendaient — où vos docs vivent dans git, pas dans la base de données de quelqu'un d'autre. Écrivez dans un beau éditeur WYSIWYG, et chaque changement devient un vrai commit git."
[about_bullet1]
other = "Binaire unique ou Docker — opérationnel en moins de 30 secondes. Pas de configuration complexe."
[about_bullet2]
other = "La technologie Content Ledger garantit la synchronisation git bidirectionnelle sans perte de données."
[about_bullet3]
other = "Vos données restent sur vos serveurs. Markdown standard dans git — zéro vendor lock-in."
[about_p2]
other = "Contrairement à Notion, Confluence ou GitBook, Valoryx vous donne l'expérience d'édition riche des outils SaaS avec la portabilité et le contrôle de git."
[about_p3]
other = "Construit avec Go et Next.js, Valoryx est conçu pour la performance. Chargements de pages en moins de 50ms, recherche plein texte sur toute votre documentation."
