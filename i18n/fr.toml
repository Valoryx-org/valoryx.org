[faq_title]
other = "Questions Fréquentes"
[faq_subtitle]
other = "Des questions ? Nous avons des réponses."
[faq1_q]
other = "Valoryx est-il vraiment gratuit pour les petites équipes ?"
[faq1_a]
other = "Oui. L'édition Communauté est gratuite à vie pour jusqu'à 5 éditeurs. C'est un binaire Go unique que vous exécutez sur votre propre serveur — pas de clés de licence, pas de restrictions de fonctionnalités, pas de télémétrie."
[faq2_q]
other = "Comment fonctionne la synchronisation git bidirectionnelle ?"
[faq2_a]
other = "Chaque modification effectuée dans l'interface web est écrite dans un dépôt git, et chaque commit poussé vers git apparaît dans l'interface web. Le Content Ledger garantit zéro perte de données."
[faq3_q]
other = "Puis-je auto-héberger Valoryx sur ma propre infrastructure ?"
[faq3_a]
other = "Absolument. Valoryx est un binaire Go unique sans dépendances externes. Téléchargez, exécutez et vous êtes opérationnel en moins de 30 secondes. Fonctionne sur Linux, macOS et Windows."
[faq4_q]
other = "Comment Valoryx se compare-t-il à Notion ou GitBook ?"
[faq4_a]
other = "Contrairement à Notion et GitBook, Valoryx est auto-hébergé et git-native. Vos données restent sur vos serveurs. Chaque changement est un vrai commit git."
[faq5_q]
other = "Que se passe-t-il avec mes données si j'arrête d'utiliser Valoryx ?"
[faq5_a]
other = "Votre documentation est stockée sous forme de fichiers Markdown standard dans un dépôt git. Si vous arrêtez d'utiliser Valoryx, votre contenu reste dans git — lisible, portable et à vous pour toujours."
[faq6_q]
other = "Valoryx supporte-t-il plusieurs espaces de travail ?"
[faq6_a]
other = "Oui. Les plans Équipe et Entreprise supportent des espaces illimités, l'intégration SSO, l'audit logging et le contrôle d'accès granulaire par rôle."

