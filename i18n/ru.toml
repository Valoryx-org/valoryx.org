[faq_title]
other = "Часто Задаваемые Вопросы"
[faq_subtitle]
other = "Есть вопросы? У нас есть ответы."
[faq1_q]
other = "Valoryx действительно бесплатен для малых команд?"
[faq1_a]
other = "Да. Community Edition бесплатна навсегда для до 5 редакторов. Это один бинарный файл Go, который вы запускаете на своём сервере — без лицензионных ключей, без ограничений функций."
[faq2_q]
other = "Как работает двунаправленная git-синхронизация?"
[faq2_a]
other = "Каждое изменение в веб-интерфейсе записывается в git-репозиторий, а каждый коммит, отправленный в git, появляется в веб-UI. Content Ledger гарантирует отсутствие потери данных."
[faq3_q]
other = "Могу ли я разместить Valoryx на собственной инфраструктуре?"
[faq3_a]
other = "Абсолютно. Valoryx — это один бинарный файл Go без внешних зависимостей. Скачайте, запустите — и готово менее чем за 30 секунд. Работает на Linux, macOS и Windows."
[faq4_q]
other = "Как Valoryx сравнивается с Notion или GitBook?"
[faq4_a]
other = "В отличие от Notion и GitBook, Valoryx является self-hosted и git-native. Ваши данные остаются на ваших серверах. Каждое изменение — реальный git-коммит."
[faq5_q]
other = "Что произойдёт с моими данными, если я перестану использовать Valoryx?"
[faq5_a]
other = "Ваша документация хранится как стандартные Markdown-файлы в git-репозитории. Если вы перестанете использовать Valoryx, ваш контент останется в git — читаемый, портабельный и навсегда ваш."
[faq6_q]
other = "Valoryx поддерживает несколько рабочих пространств?"
[faq6_a]
other = "Да. Планы Team и Business поддерживают неограниченное количество рабочих пространств, интеграцию SSO, audit logging и гранулярный контроль доступа на основе ролей."

