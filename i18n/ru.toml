[about_title]
other = "О Valoryx"
[about_subtitle]
other = "Платформа документации для команд, серьёзно относящихся к своим докам"
[about_p1]
other = "Valoryx — платформа документации, которую разработчики давно ждали: где ваши доки живут в git, а не в чужой базе данных. Пишите в красивом WYSIWYG-редакторе, и каждое изменение становится реальным git-коммитом."
[about_bullet1]
other = "Один бинарник или Docker — готово за 30 секунд. Никакой сложной настройки."
[about_bullet2]
other = "Технология Content Ledger гарантирует двунаправленный git-синк без потери данных."
[about_bullet3]
other = "Ваши данные остаются на ваших серверах. Стандартный Markdown в git — никакой привязки к вендору."
[about_p2]
other = "В отличие от Notion, Confluence или GitBook, Valoryx даёт богатый опыт редактирования SaaS-инструментов с портабельностью и контролем git."
[about_p3]
other = "Построен на Go и Next.js. Valoryx создан для производительности. Загрузка страниц менее 50ms, полнотекстовый поиск по всей документации."
