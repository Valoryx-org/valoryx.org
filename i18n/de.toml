[faq_title]
other = "Häufig Gestellte Fragen"
[faq_subtitle]
other = "Fragen? Wir haben Antworten."
[faq1_q]
other = "Ist Valoryx wirklich kostenlos für kleine Teams?"
[faq1_a]
other = "Ja. Die Community Edition ist für bis zu 5 Editoren dauerhaft kostenlos. Es ist ein einzelnes Go-Binary, das Sie auf Ihrem eigenen Server ausführen — keine Lizenzschlüssel, keine Feature-Gates."
[faq2_q]
other = "Wie funktioniert die bidirektionale Git-Synchronisierung?"
[faq2_a]
other = "Jede in der Web-UI vorgenommene Bearbeitung wird in ein Git-Repository geschrieben, und jeder in Git gepushte Commit erscheint in der Web-UI. Der Content Ledger gewährleistet null Datenverlust."
[faq3_q]
other = "Kann ich Valoryx auf meiner eigenen Infrastruktur self-hosten?"
[faq3_a]
other = "Absolut. Valoryx ist ein einzelnes Go-Binary ohne externe Abhängigkeiten. Herunterladen, ausführen und in unter 30 Sekunden live. Funktioniert auf Linux, macOS und Windows."
[faq4_q]
other = "Wie vergleicht sich Valoryx mit Notion oder GitBook?"
[faq4_a]
other = "Im Gegensatz zu Notion und GitBook ist Valoryx self-hosted und git-native. Ihre Daten bleiben auf Ihren Servern. Jede Änderung ist ein echter Git-Commit."
[faq5_q]
other = "Was passiert mit meinen Daten, wenn ich Valoryx nicht mehr nutze?"
[faq5_a]
other = "Ihre Dokumentation wird als Standard-Markdown-Dateien in einem Git-Repository gespeichert. Wenn Sie Valoryx nicht mehr nutzen, bleibt Ihr Inhalt in git — lesbar, portierbar und für immer Ihres."
[faq6_q]
other = "Unterstützt Valoryx mehrere Arbeitsbereiche?"
[faq6_a]
other = "Ja. Team- und Business-Pläne unterstützen unbegrenzte Arbeitsbereiche, SSO-Integration, Audit-Logging und granulare rollenbasierte Zugriffskontrolle."

