[about_title]
other = "Über Valoryx"
[about_subtitle]
other = "Eine Dokumentationsplattform für Teams, die ihre Docs ernst nehmen"
[about_p1]
other = "Valoryx ist die Dokumentationsplattform, auf die Entwickler gewartet haben — eine, bei der Ihre Docs in git leben, nicht in der Datenbank eines anderen. Schreiben Sie in einem schönen WYSIWYG-Editor, und jede Änderung wird ein echter Git-Commit."
[about_bullet1]
other = "Einzelnes Binary oder Docker — betriebsbereit in unter 30 Sekunden. Keine komplexe Einrichtung."
[about_bullet2]
other = "Content-Ledger-Technologie gewährleistet bidirektionale Git-Synchronisierung ohne Datenverlust."
[about_bullet3]
other = "Ihre Daten bleiben auf Ihren Servern. Standard-Markdown in git — kein Vendor Lock-in."
[about_p2]
other = "Im Gegensatz zu Notion, Confluence oder GitBook bietet Valoryx die reiche Bearbeitungserfahrung von SaaS-Tools mit der Portabilität und Kontrolle von git."
[about_p3]
other = "Mit Go und Next.js gebaut, ist Valoryx auf Performance ausgelegt. Seitenladungen unter 50ms, Volltextsuche über all Ihre Docs."
[about_cta1]
other = "Funktionen erkunden"

