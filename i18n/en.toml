# ── About ─────────────────────────────────────────────────────────────────────
[about_title]
other = "About Valoryx"
[about_subtitle]
other = "A documentation platform built for teams that take their docs seriously"
[about_p1]
other = "Valoryx is the documentation platform developers have been waiting for — one where your docs live in git, not in someone else's database. Write in a beautiful WYSIWYG editor, and every change becomes a real git commit. Push from your IDE, and it appears in the web UI instantly."
[about_bullet1]
other = "Single binary or Docker — running in under 30 seconds. No complex setup, no external databases."
[about_bullet2]
other = "Content Ledger technology ensures bidirectional git sync with zero data loss."
[about_bullet3]
other = "Your data stays on your servers. Standard Markdown in git — zero vendor lock-in."
[about_p2]
other = "Unlike Notion, Confluence, or GitBook, Valoryx gives you the rich editing experience of SaaS tools with the portability and control of git. Self-host it on a $5 VPS or deploy to your enterprise infrastructure."
[about_p3]
other = "Built with Go and Next.js, Valoryx is designed for performance. Sub-50ms page loads, full-text search across all your docs, and beautiful published documentation sites with themes."
[about_cta1]
other = "Explore Features"

