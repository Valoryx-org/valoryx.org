# ── FAQ ───────────────────────────────────────────────────────────────────────
[faq_title]
other = "Frequently Asked Questions"
[faq_subtitle]
other = "Got questions? We've got answers."
[faq1_q]
other = "Is Valoryx really free for small teams?"
[faq1_a]
other = "Yes. The Community edition is free forever for up to 5 editors. It's a single Go binary you run on your own server — no license keys, no feature gates, no telemetry. You get git sync, WYSIWYG editing, published docs, and full-text search at zero cost."
[faq2_q]
other = "How does bidirectional git sync work?"
[faq2_a]
other = "Every edit made in the web UI is written to a git repository, and every commit pushed to git appears in the web UI. The Content Ledger ensures zero data loss — your documentation is always backed by real git history. No conflicts, no sync issues."
[faq3_q]
other = "Can I self-host Valoryx on my own infrastructure?"
[faq3_a]
other = "Absolutely. Valoryx is a single Go binary with zero external dependencies. Download, run, and you're live in under 30 seconds. Works on Linux, macOS, and Windows — run the binary directly or use Docker on any OS."
[faq4_q]
other = "How does Valoryx compare to Notion or GitBook?"
[faq4_a]
other = "Unlike Notion and GitBook, Valoryx is self-hosted and git-native. Your data stays on your servers. Every change is a real git commit. You get the polished editing experience of SaaS tools with the control and portability of git."
[faq5_q]
other = "What happens to my data if I stop using Valoryx?"
[faq5_a]
other = "Your documentation is stored as standard Markdown files in a git repository. If you stop using Valoryx, your content remains in git — readable, portable, and yours forever. Zero vendor lock-in. This is the whole point."
[faq6_q]
other = "Does Valoryx support multiple workspaces?"
[faq6_a]
other = "Yes. Team and Business plans support unlimited workspaces, SSO integration, audit logging, and granular role-based access control. Each workspace can connect to its own git repository."

