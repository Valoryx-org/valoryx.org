[faq_title]
other = "Часті Запитання"
[faq_subtitle]
other = "Маєте запитання? Маємо відповіді."
[faq1_q]
other = "Valoryx справді безкоштовний для малих команд?"
[faq1_a]
other = "Так. Community Edition безкоштовна назавжди для до 5 редакторів. Це один бінарний файл Go, який ви запускаєте на своєму сервері — без ліцензійних ключів, без обмежень функцій."
[faq2_q]
other = "Як працює двостороння git-синхронізація?"
[faq2_a]
other = "Кожна зміна у веб-інтерфейсі записується у git-репозиторій, а кожен коміт, відправлений у git, з'являється у веб-UI. Content Ledger гарантує відсутність втрати даних."
[faq3_q]
other = "Чи можу я розмістити Valoryx на власній інфраструктурі?"
[faq3_a]
other = "Абсолютно. Valoryx — це один бінарний файл Go без зовнішніх залежностей. Завантажте, запустіть — і готово менш ніж за 30 секунд. Працює на Linux, macOS та Windows."
[faq4_q]
other = "Як Valoryx порівнюється з Notion або GitBook?"
[faq4_a]
other = "На відміну від Notion та GitBook, Valoryx є self-hosted та git-native. Ваші дані залишаються на ваших серверах. Кожна зміна — реальний git-коміт."
[faq5_q]
other = "Що станеться з моїми даними, якщо я перестану використовувати Valoryx?"
[faq5_a]
other = "Ваша документація зберігається як стандартні Markdown-файли у git-репозиторії. Якщо ви перестанете використовувати Valoryx, ваш контент залишиться у git — читабельний, портативний і назавжди ваш."
[faq6_q]
other = "Valoryx підтримує кілька робочих просторів?"
[faq6_a]
other = "Так. Плани Team та Business підтримують необмежену кількість робочих просторів, інтеграцію SSO, audit logging та гранулярний контроль доступу на основі ролей."

