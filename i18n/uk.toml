[about_title]
other = "Про Valoryx"
[about_subtitle]
other = "Платформа документації для команд, що серйозно ставляться до своїх доків"
[about_p1]
other = "Valoryx — платформа документації, на яку розробники давно чекали: де ваші доки живуть у git, а не в чужій базі даних. Пишіть у красивому WYSIWYG-редакторі, і кожна зміна стає реальним git-комітом."
[about_bullet1]
other = "Один бінарник або Docker — готово за 30 секунд. Жодного складного налаштування."
[about_bullet2]
other = "Технологія Content Ledger гарантує двосторонній git-синк без втрати даних."
[about_bullet3]
other = "Ваші дані залишаються на ваших серверах. Стандартний Markdown у git — жодної прив'язки до вендора."
[about_p2]
other = "На відміну від Notion, Confluence або GitBook, Valoryx дає багатий досвід редагування SaaS-інструментів з портативністю та контролем git."
[about_p3]
other = "Побудований на Go та Next.js, Valoryx створений для продуктивності. Завантаження сторінок менше 50ms, повнотекстовий пошук по всій документації."
