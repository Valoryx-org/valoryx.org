[about_title]
other = "Acerca de Valoryx"
[about_subtitle]
other = "Una plataforma de documentación para equipos que se toman en serio sus docs"
[about_p1]
other = "Valoryx es la plataforma de documentación que los desarrolladores han estado esperando — una donde tus docs viven en git, no en la base de datos de otra persona. Escribe en un hermoso editor WYSIWYG, y cada cambio se convierte en un commit git real."
[about_bullet1]
other = "Binario único o Docker — en funcionamiento en menos de 30 segundos. Sin configuración compleja."
[about_bullet2]
other = "La tecnología Content Ledger garantiza sincronización git bidireccional con cero pérdida de datos."
[about_bullet3]
other = "Tus datos permanecen en tus servidores. Markdown estándar en git — cero vendor lock-in."
[about_p2]
other = "A diferencia de Notion, Confluence o GitBook, Valoryx te da la rica experiencia de edición de herramientas SaaS con la portabilidad y control de git."
[about_p3]
other = "Construido con Go y Next.js, Valoryx está diseñado para el rendimiento. Cargas de página por debajo de 50ms, búsqueda de texto completo en toda tu documentación."
