[faq_title]
other = "Preguntas Frecuentes"
[faq_subtitle]
other = "¿Tienes preguntas? Tenemos respuestas."
[faq1_q]
other = "¿Es Valoryx realmente gratuito para equipos pequeños?"
[faq1_a]
other = "Sí. La edición Comunidad es gratuita para siempre para hasta 5 editores. Es un binario Go único que ejecutas en tu propio servidor — sin claves de licencia, sin restricciones de características."
[faq2_q]
other = "¿Cómo funciona la sincronización git bidireccional?"
[faq2_a]
other = "Cada edición realizada en la UI web se escribe en un repositorio git, y cada commit enviado a git aparece en la UI web. El Content Ledger garantiza cero pérdida de datos."
[faq3_q]
other = "¿Puedo auto-alojar Valoryx en mi propia infraestructura?"
[faq3_a]
other = "Absolutamente. Valoryx es un binario Go único sin dependencias externas. Descarga, ejecuta y en marcha en menos de 30 segundos. Funciona en Linux, macOS y Windows."
[faq4_q]
other = "¿Cómo se compara Valoryx con Notion o GitBook?"
[faq4_a]
other = "A diferencia de Notion y GitBook, Valoryx es auto-alojado y git-native. Tus datos permanecen en tus servidores. Cada cambio es un commit git real."
[faq5_q]
other = "¿Qué pasa con mis datos si dejo de usar Valoryx?"
[faq5_a]
other = "Tu documentación se almacena como archivos Markdown estándar en un repositorio git. Si dejas de usar Valoryx, tu contenido permanece en git — legible, portable y tuyo para siempre."
[faq6_q]
other = "¿Valoryx admite múltiples espacios de trabajo?"
[faq6_a]
other = "Sí. Los planes Equipo y Empresa admiten espacios ilimitados, integración SSO, audit logging y control de acceso granular basado en roles."

