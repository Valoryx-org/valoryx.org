[feat1_title]
other = "Content Ledger"
[feat1_text]
other = "Motor de sincronización bidireccional. Cada edición web crea un commit git, cada push git actualiza la UI. Sin conflictos, cero pérdida de datos."
[feat2_title]
other = "Git Sync"
[feat2_text]
other = "Funciona con GitHub, GitLab, Bitbucket o cualquier remote git. Tus docs son archivos Markdown estándar en un repositorio real."
[feat3_title]
other = "Editor WYSIWYG"
[feat3_text]
other = "Editor rico potenciado por Tiptap que genera Markdown limpio. Tablas, bloques de código, embeds de imágenes, callouts y comandos slash."
[feat4_title]
other = "Docs Publicadas"
[feat4_text]
other = "Genera hermosos sitios de documentación con un clic. Temas, versioning y optimización SEO."
[feat5_title]
other = "Búsqueda de Texto Completo"
[feat5_text]
other = "Búsqueda ultra-rápida en toda tu documentación. Motor FTS5 integrado con resultados instantáneos."
[feat6_title]
other = "Control de Acceso"
[feat6_text]
other = "Permisos granulares basados en roles — espectador, editor, admin. SSO con SAML/OIDC, audit logging y aislamiento de espacios de trabajo."

